<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Scholar Hero Slider</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="slider">

<div class="slide fade">
<img src="images/banner1.png" alt="Banner 1">
</div>

<div class="slide fade">
<img src="images/banner2.png" alt="Banner 2">
</div>

<div class="slide fade">
<img src="images/banner3.png" alt="Banner 3">
</div>

<div class="slide fade">
<img src="images/banner4.png" alt="Banner 4">
</div>

<div class="slide fade">
<img src="images/banner5.png" alt="Banner 5">
</div>

<a class="prev" onclick="plusSlides(-1)">❮</a>
<a class="next" onclick="plusSlides(1)">❯</a>

<div class="dots">
<span class="dot" onclick="currentSlide(1)"></span>
<span class="dot" onclick="currentSlide(2)"></span>
<span class="dot" onclick="currentSlide(3)"></span>
<span class="dot" onclick="currentSlide(4)"></span>
<span class="dot" onclick="currentSlide(5)"></span>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
